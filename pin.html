<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="text-align:center;font-family:sans-serif;">

<h3>Enter PIN</h3>

<input id="pin" maxlength="4" type="password" style="font-size:20px;padding:10px">

<br><br>

<button onclick="send()" style="padding:10px 20px;font-size:16px">OK</button>

<script>
function send(){
    let pin = document.getElementById("pin").value;
    Telegram.WebApp.sendData(pin);
}
</script>

</body>
</html>
